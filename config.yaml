settings:
  jmx_template: templates/base_template.jmx
  jmeter_path: jmeter # auto-detected: checks /opt/homebrew/bin/jmeter first, then PATH
  thread_levels: [10, 15, 20, 25, 30, 35, 40, 45, 50]
  loops_per_level: 20
  api_interval_seconds: 30 # recovery time between APIs
  model_provider: ollama # ollama | groq | gemini | anthropic
  model_name: qwen3.5:9b # llama3 | mixtral-8x7b-32768 | gemini-1.5-flash | claude-3-haiku-20240307
  report_title: API Stress Test Report # cover page title; also used to derive the output filename
  breaking_point_error_pct: 5.0 # error % above which a thread level counts as the breaking point
  early_stop_p95_ms: null # optional p95 latency (ms) that also triggers an early stop; null disables
  regression_threshold_pct: 20.0 # % degradation vs previous MLflow run that gets flagged
  mlflow_tracking_uri: null # null -> MLflow default (./mlruns); overridden by MLFLOW_TRACKING_URI env var
  prometheus_enabled: true # add a Prometheus BackendListener to generated .jmx files
  prometheus_port: 9270 # port JMeter's Prometheus exporter listens on during a run

apis:
  - name: dashboard
    url: https://domain.com/dashboard
    method: POST
    headers:
      Content-Type: application/json
    body: |
      {"user":123}


